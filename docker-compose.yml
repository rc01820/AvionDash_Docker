version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: aviondash-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-aviondash_root}
      MYSQL_DATABASE:      ${MYSQL_DATABASE:-aviondash}
      MYSQL_USER:          ${MYSQL_USER:-aviondash}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD:-aviondash_pass}
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "3306:3306"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root",
             "-p${MYSQL_ROOT_PASSWORD:-aviondash_root}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    labels:
      com.aviondash.tier: "database"
      com.aviondash.service: "aviondash"

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: aviondash-app
    restart: unless-stopped
    environment:
      DB_HOST:     db
      DB_PORT:     "3306"
      DB_NAME:     ${MYSQL_DATABASE:-aviondash}
      DB_USER:     ${MYSQL_USER:-aviondash}
      DB_PASSWORD: ${MYSQL_PASSWORD:-aviondash_pass}
      SECRET_KEY:  ${SECRET_KEY:-aviondash-secret-key-change-in-prod}
      # Datadog APM – only active when DD_API_KEY is set in .env
      DD_SERVICE:                  aviondash-app
      DD_ENV:                      demo
      DD_VERSION:                  "1.0.0"
      DD_AGENT_HOST:               datadog-agent
      DD_TRACE_AGENT_PORT:         "8126"
      DD_LOGS_INJECTION:           "true"
      DD_RUNTIME_METRICS_ENABLED:  "true"
      DD_TRACE_ENABLED:            ${DD_TRACE_ENABLED:-false}
    volumes:
      - app_logs:/var/log/aviondash
    ports:
      - "8000:8000"
    networks:
      - backend
      - frontend
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s
    labels:
      com.aviondash.tier: "application"
      com.aviondash.service: "aviondash"

  web:
    image: nginx:1.25-alpine
    container_name: aviondash-web
    restart: unless-stopped
    volumes:
      - ./nginx/conf/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf/aviondash.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/html:/usr/share/nginx/html:ro
      - nginx_logs:/var/log/nginx
    ports:
      - "80:80"
    networks:
      - frontend
    depends_on:
      app:
        condition: service_healthy
    labels:
      com.aviondash.tier: "web"
      com.aviondash.service: "aviondash"

  # ── Datadog Agent ─────────────────────────────────────────────────────────
  # Uncomment this entire block to enable Datadog monitoring.
  # Requires DD_API_KEY to be set in your .env file.
  #
  # datadog-agent:
  #   image: gcr.io/datadoghq/agent:latest
  #   container_name: aviondash-dd-agent
  #   restart: unless-stopped
  #   environment:
  #     DD_API_KEY:                           ${DD_API_KEY}
  #     DD_SITE:                              ${DD_SITE:-datadoghq.com}
  #     DD_APM_ENABLED:                       "true"
  #     DD_APM_NON_LOCAL_TRAFFIC:             "true"
  #     DD_LOGS_ENABLED:                      "true"
  #     DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL: "true"
  #     DD_PROCESS_AGENT_ENABLED:             "true"
  #     DD_DOGSTATSD_NON_LOCAL_TRAFFIC:       "true"
  #     DD_CONTAINER_EXCLUDE:                 "name:aviondash-dd-agent"
  #     DD_ENV:                               demo
  #     DD_SERVICE:                           aviondash
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock:ro
  #     - /proc/:/host/proc/:ro
  #     - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro
  #   ports:
  #     - "8125:8125/udp"
  #     - "8126:8126"
  #   networks:
  #     - backend
  #     - frontend

networks:
  frontend:
    name: aviondash-frontend
  backend:
    name: aviondash-backend

volumes:
  db_data:
    name: aviondash-db-data
  app_logs:
    name: aviondash-app-logs
  nginx_logs:
    name: aviondash-nginx-logs
